<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios</title>
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/contacto/contacto.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="tittle">MentalHealth Project</h1>
            <img src="/assets/img/logo.png" alt="logo">
            <div>
                <ul class="list-item">
                    <li id ="Home"><a href="index.html">Home</a></li>
                    <li id="Servicios"><a href="servicios.html">Servicios</a></li>
                    <li id="Galeria"><a href="galeria.html">Experiencias</a></li>
                    <li id="Contactanos"><a href="contacto.html">Contactanos</a></li>
                </ul>
            </div>
        </nav>
    </header>
<main>

    <section id="contacto">
        <h2>Contacto</h2>
        <form>
            <!-- Nombre -->
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>
            
            <!-- Email -->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            
            <!-- Teléfono -->
            <label for="telefono">Teléfono:</label><br>
            <input type="tel" id="telefono" name="telefono"><br><br>
            
            <!-- Comentarios -->
            <label for="comentarios">Comentarios:</label><br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="40"></textarea><br><br>
            
            <!-- Selector desplegable -->
            <label for="motivo">Motivo de contacto:</label><br>
            <select id="motivo" name="motivo">
                <option value="">Seleccione una opción</option>
                <option value="consulta">Consulta general</option>
                <option value="turno">Solicitar turno</option>
                <option value="sugerencia">Sugerencia</option>
                <option value="otro">Otro</option>
            </select><br><br>
            
            <!-- Radio buttons -->
            <label>¿Cómo te gustaría que te contactemos?</label><br>
            <input type="radio" id="contacto-email" name="preferencia" value="email">
            <label for="contacto-email">Email</label><br>
            <input type="radio" id="contacto-telefono" name="preferencia" value="telefono">
            <label for="contacto-telefono">Teléfono</label><br><br>
            
        <!-- Checkbox -->
        <input type="checkbox" id="acepto" name="acepto" required>
        <label for="acepto">Acepto los términos y condiciones</label><br><br>
        
        <!-- Botones -->
        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
    </form>
</section>

</main>

<footer>
    <p>MentalHealth Project. All rights reserved.</p>
    <p>Email: 2345@gmail.com</p>
    <a href="https://github.com" target="_blank">
        <img src="/assets/icon/github-brands.svg" class="icon" alt="GitHub" width="30">
    </a>
    <a href="https://linkedin.com" target="_blank">
        <img src="/assets/icon/linkedin-brands.svg" class="icon" alt="LinkedIn" width="30">
    </a>
</footer>

</body>
</html>
